I am a second year CS PhD student at UW Madison.
I am furtunate to work in the Wisc Privacy Lab, advised by Prof. Kassem Fawaz.
I'm currently excited about reverse engineering mobile and web applications for privacy, and extracting ML models from them.
Before this, I got my BS/MS from UC San Diego.
I was lucky to work with Prof. Earlence Fernandes in the cryptosec group on building better authorization systems for cloud apps.
"""

